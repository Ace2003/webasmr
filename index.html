<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>助眠音乐 - Sleep Sounds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Noto Sans SC', sans-serif;
        }
        
        .scene-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .scene-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .scene-card.active {
            border: 3px solid #8b5cf6;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.4);
        }
        
        .rain-drop {
            position: absolute;
            width: 2px;
            background: linear-gradient(transparent, rgba(174, 194, 224, 0.8));
            animation: fall linear infinite;
            pointer-events: none;
        }
        
        @keyframes fall {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }
        
        .wave {
            position: absolute;
            width: 200%;
            height: 100%;
            background: linear-gradient(transparent, rgba(100, 180, 255, 0.3));
            animation: wave linear infinite;
            pointer-events: none;
        }
        
        @keyframes wave {
            0% { transform: translateX(0) translateY(0); }
            50% { transform: translateX(-25%) translateY(-5px); }
            100% { transform: translateX(-50%) translateY(0); }
        }
        
        .book-page {
            position: absolute;
            width: 40%;
            height: 80%;
            background: rgba(255, 245, 220, 0.9);
            animation: flip ease-in-out infinite;
            pointer-events: none;
            transform-origin: left center;
        }
        
        @keyframes flip {
            0%, 100% { transform: rotateY(0deg); opacity: 1; }
            50% { transform: rotateY(-90deg); opacity: 0.3; }
        }
        
        .coffee-steam {
            position: absolute;
            width: 20px;
            height: 40px;
            background: linear-gradient(transparent, rgba(255, 255, 255, 0.6));
            border-radius: 50%;
            animation: rise ease-out infinite;
            pointer-events: none;
        }
        
        @keyframes rise {
            0% { transform: translateY(0) scale(0.5); opacity: 0.8; }
            100% { transform: translateY(-60px) scale(1.5); opacity: 0; }
        }
        
        .control-panel {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 92, 246, 0.3);
        }
        
        .slider-container input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            background: rgba(139, 92, 246, 0.3);
            border-radius: 3px;
            outline: none;
        }
        
        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: #8b5cf6;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
        }
        
        .play-btn {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }
        
        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6);
        }
        
        .play-btn.playing {
            background: linear-gradient(135deg, #10b981, #059669);
        }
        
        .click-hint {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        .scene-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        
        .volume-wave {
            position: absolute;
            border: 2px solid rgba(139, 92, 246, 0.5);
            border-radius: 50%;
            animation: expand 1s ease-out infinite;
            pointer-events: none;
        }
        
        @keyframes expand {
            0% { width: 0; height: 0; opacity: 1; }
            100% { width: 100px; height: 100px; opacity: 0; margin-top: -50px; margin-left: -50px; }
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-900 to-slate-900">
    <!-- Header -->
    <header class="py-8 px-4 text-center">
        <h1 class="text-4xl md:text-5xl font-light text-white mb-3 tracking-wide">
            <span class="text-purple-400">🌙</span> 助眠音乐
        </h1>
        <p class="text-gray-400 text-lg">选择一个场景，让自然的声音伴你入眠</p>
        <p class="text-purple-400 text-sm mt-2 click-hint">💡 点击场景图片可以调节音效频率哦~</p>
    </header>

    <!-- Scenes Grid -->
    <main class="container mx-auto px-4 pb-32">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- 深夜雨天 -->
            <div class="scene-card relative rounded-2xl overflow-hidden bg-slate-800 shadow-xl" data-scene="rain" onclick="selectScene('rain')">
                <div class="scene-overlay" id="rain-overlay"></div>
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=night%20city%20rainy%20street%20cozy%20window%20rain%20drops%20atmospheric%20moody%20lighting&image_size=square_hd" 
                     alt="深夜的雨天" 
                     class="w-full h-48 object-cover opacity-90">
                <div class="p-5">
                    <h3 class="text-xl font-medium text-white mb-2">🌧️ 深夜的雨天</h3>
                    <p class="text-gray-400 text-sm mb-3">雨声淅沥，放松身心</p>
                    <div class="flex items-center justify-between">
                        <span class="text-purple-400 text-sm">频率: <span id="rain-freq">1.0</span>x</span>
                        <span class="text-gray-500 text-xs">点击调节</span>
                    </div>
                </div>
            </div>

            <!-- 图书馆 -->
            <div class="scene-card relative rounded-2xl overflow-hidden bg-slate-800 shadow-xl" data-scene="library" onclick="selectScene('library')">
                <div class="scene-overlay" id="library-overlay"></div>
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=cozy%20library%20interior%20bookshelves%20warm%20lighting%20peaceful%20reading%20nook%20classic%20atmosphere&image_size=square_hd" 
                     alt="图书馆" 
                     class="w-full h-48 object-cover opacity-90">
                <div class="p-5">
                    <h3 class="text-xl font-medium text-white mb-2">📚 图书馆</h3>
                    <p class="text-gray-400 text-sm mb-3">静谧环境，翻书声伴读</p>
                    <div class="flex items-center justify-between">
                        <span class="text-purple-400 text-sm">频率: <span id="library-freq">1.0</span>x</span>
                        <span class="text-gray-500 text-xs">点击调节</span>
                    </div>
                </div>
            </div>

            <!-- 咖啡店 -->
            <div class="scene-card relative rounded-2xl overflow-hidden bg-slate-800 shadow-xl" data-scene="cafe" onclick="selectScene('cafe')">
                <div class="scene-overlay" id="cafe-overlay"></div>
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=cozy%20coffee%20shop%20interior%20warm%20ambiance%20steam%20from%20coffee%20cup%20soft%20lighting%20comfortable&image_size=square_hd" 
                     alt="咖啡店" 
                     class="w-full h-48 object-cover opacity-90">
                <div class="p-5">
                    <h3 class="text-xl font-medium text-white mb-2">☕ 咖啡店</h3>
                    <p class="text-gray-400 text-sm mb-3">舒缓环境音，放松心情</p>
                    <div class="flex items-center justify-between">
                        <span class="text-purple-400 text-sm">频率: <span id="cafe-freq">1.0</span>x</span>
                        <span class="text-gray-500 text-xs">点击调节</span>
                    </div>
                </div>
            </div>

            <!-- 海边 -->
            <div class="scene-card relative rounded-2xl overflow-hidden bg-slate-800 shadow-xl" data-scene="ocean" onclick="selectScene('ocean')">
                <div class="scene-overlay" id="ocean-overlay"></div>
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=peaceful%20ocean%20beach%20sunset%20gentle%20waves%20calming%20seascape%20serene%20coastal%20scene&image_size=square_hd" 
                     alt="海边" 
                     class="w-full h-48 object-cover opacity-90">
                <div class="p-5">
                    <h3 class="text-xl font-medium text-white mb-2">🌊 海边</h3>
                    <p class="text-gray-400 text-sm mb-3">海浪轻拍，自然韵律</p>
                    <div class="flex items-center justify-between">
                        <span class="text-purple-400 text-sm">频率: <span id="ocean-freq">1.0</span>x</span>
                        <span class="text-gray-500 text-xs">点击调节</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Control Panel -->
    <div class="fixed bottom-0 left-0 right-0 control-panel p-6">
        <div class="container mx-auto">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <!-- Scene Info -->
                <div class="flex items-center gap-4">
                    <div class="text-white">
                        <p class="text-sm text-gray-400">当前场景</p>
                        <p class="text-lg font-medium" id="current-scene-name">未选择场景</p>
                    </div>
                </div>

                <!-- Play Controls -->
                <div class="flex items-center gap-4">
                    <button class="text-gray-400 hover:text-white transition" onclick="toggleMute()" id="mute-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" id="volume-icon">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                    </button>
                    
                    <div class="play-btn" id="play-btn" onclick="togglePlay()">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white ml-1" fill="currentColor" viewBox="0 0 24 24" id="play-icon">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                    </div>

                    <button class="text-gray-400 hover:text-white transition" onclick="resetAll()">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                    </button>
                </div>

                <!-- Volume Slider -->
                <div class="slider-container w-full md:w-48">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-sm text-gray-400">音量</span>
                        <span class="text-sm text-purple-400" id="volume-value">70%</span>
                    </div>
                    <input type="range" min="0" max="100" value="70" id="volume-slider" class="w-full" oninput="setVolume(this.value)">
                </div>
            </div>
        </div>
    </div>

    <script>
        // Audio context and nodes
        let audioContext;
        let masterGainNode;
        let isMuted = false;
        let isPlaying = false;
        let currentScene = null;
        
        // Scene configurations
        const scenes = {
            rain: {
                name: '深夜的雨天',
                icon: '🌧️',
                frequency: 1.0,
                minFreq: 0.5,
                maxFreq: 2.0,
                step: 0.25,
                volume: 0.7,
                oscillators: [],
                noiseNodes: []
            },
            library: {
                name: '图书馆',
                icon: '📚',
                frequency: 1.0,
                minFreq: 0.5,
                maxFreq: 2.0,
                step: 0.25,
                volume: 0.5,
                oscillators: [],
                noiseNodes: []
            },
            cafe: {
                name: '咖啡店',
                icon: '☕',
                frequency: 1.0,
                minFreq: 0.5,
                maxFreq: 2.0,
                step: 0.25,
                volume: 0.4,
                oscillators: [],
                noiseNodes: []
            },
            ocean: {
                name: '海边',
                icon: '🌊',
                frequency: 1.0,
                minFreq: 0.5,
                maxFreq: 2.0,
                step: 0.25,
                volume: 0.6,
                oscillators: [],
                noiseNodes: []
            }
        };

        // Initialize audio context
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                masterGainNode = audioContext.createGain();
                masterGainNode.gain.value = 0.7;
                masterGainNode.connect(audioContext.destination);
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }

        // Create white noise buffer
        function createNoiseBuffer() {
            const bufferSize = 2 * audioContext.sampleRate;
            const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
            const output = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }
            return buffer;
        }

        // Create pink noise (filtered white noise)
        function createPinkNoiseBuffer() {
            const bufferSize = 2 * audioContext.sampleRate;
            const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
            const output = buffer.getChannelData(0);
            let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
            for (let i = 0; i < bufferSize; i++) {
                const white = Math.random() * 2 - 1;
                b0 = 0.99886 * b0 + white * 0.0555179;
                b1 = 0.99332 * b1 + white * 0.0750759;
                b2 = 0.96900 * b2 + white * 0.1538520;
                b3 = 0.86650 * b3 + white * 0.3104856;
                b4 = 0.55000 * b4 + white * 0.5329522;
                b5 = -0.7616 * b5 - white * 0.0168980;
                output[i] = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362;
                output[i] *= 0.11;
                b6 = white * 0.115926;
            }
            return buffer;
        }

        // Create brown noise
        function createBrownNoiseBuffer() {
            const bufferSize = 2 * audioContext.sampleRate;
            const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
            const output = buffer.getChannelData(0);
            let lastOut = 0;
            for (let i = 0; i < bufferSize; i++) {
                const white = Math.random() * 2 - 1;
                output[i] = (lastOut + (0.02 * white)) / 1.02;
                lastOut = output[i];
                output[i] *= 3.5;
            }
            return buffer;
        }

        // Start rain sound
        function startRain() {
            const scene = scenes.rain;
            scene.oscillators = [];
            scene.noiseNodes = [];

            // Brown noise for rain (heavy, low frequency)
            const noiseBuffer = createBrownNoiseBuffer();
            const noiseSource = audioContext.createBufferSource();
            noiseSource.buffer = noiseBuffer;
            noiseSource.loop = true;

            // Filter for rain sound
            const filter = audioContext.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 800;

            // Gain for volume control
            const gainNode = audioContext.createGain();
            gainNode.gain.value = scene.volume * scene.frequency;

            // Connect nodes
            noiseSource.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(masterGainNode);

            noiseSource.start();
            scene.noiseNodes.push({ source: noiseSource, gain: gainNode, filter: filter });

            // Create periodic drops
            createRainDrops();
        }

        function createRainDrops() {
            const scene = scenes.rain;
            const interval = 200 / scene.frequency;

            const createDrop = () => {
                if (currentScene !== 'rain' || !isPlaying) return;
                
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(800 + Math.random() * 400, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.1);
                
                gainNode.gain.setValueAtTime(0.1 * scene.frequency, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                
                oscillator.connect(gainNode);
                gainNode.connect(masterGainNode);
                
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.1);
                
                scene.oscillators.push(oscillator);
                
                setTimeout(createDrop, Math.random() * interval);
            };
            
            createDrop();
        }

        // Start library sound
        function startLibrary() {
            const scene = scenes.library;
            scene.oscillators = [];
            scene.noiseNodes = [];

            // Low frequency hum (ambient)
            const humOsc = audioContext.createOscillator();
            const humGain = audioContext.createGain();
            humOsc.type = 'sine';
            humOsc.frequency.value = 60;
            humGain.gain.value = 0.1 * scene.volume;
            humOsc.connect(humGain);
            humGain.connect(masterGainNode);
            humOsc.start();
            scene.oscillators.push(humOsc);

            // Pink noise for ambiance
            const noiseBuffer = createPinkNoiseBuffer();
            const noiseSource = audioContext.createBufferSource();
            noiseSource.buffer = noiseBuffer;
            noiseSource.loop = true;
            
            const filter = audioContext.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 400;
            
            const gainNode = audioContext.createGain();
            gainNode.gain.value = scene.volume * 0.3;
            
            noiseSource.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(masterGainNode);
            noiseSource.start();
            scene.noiseNodes.push({ source: noiseSource, gain: gainNode });

            // Page turning sounds
            createPageTurns();
        }

        function createPageTurns() {
            const scene = scenes.library;
            const interval = 3000 / scene.frequency;

            const createPageTurn = () => {
                if (currentScene !== 'library' || !isPlaying) return;
                
                // Create page turn sound (filtered noise sweep)
                const noiseBuffer = createNoiseBuffer();
                const noiseSource = audioContext.createBufferSource();
                noiseSource.buffer = noiseBuffer;
                
                const filter = audioContext.createBiquadFilter();
                filter.type = 'bandpass';
                filter.Q.value = 5;
                filter.frequency.setValueAtTime(200, audioContext.currentTime);
                filter.frequency.exponentialRampToValueAtTime(2000, audioContext.currentTime + 0.3);
                
                const gainNode = audioContext.createGain();
                gainNode.gain.setValueAtTime(0.2 * scene.frequency, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                
                noiseSource.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(masterGainNode);
                
                noiseSource.start();
                noiseSource.stop(audioContext.currentTime + 0.5);
                
                scene.noiseNodes.push({ source: noiseSource, gain: gainNode });
                
                setTimeout(createPageTurn, interval + Math.random() * 2000);
            };
            
            setTimeout(createPageTurn, 1000);
        }

        // Start cafe sound
        function startCafe() {
            const scene = scenes.cafe;
            scene.oscillators = [];
            scene.noiseNodes = [];

            // Multiple babble voices (filtered noise)
            const createBabble = (freq, volume) => {
                const noiseBuffer = createPinkNoiseBuffer();
                const noiseSource = audioContext.createBufferSource();
                noiseSource.buffer = noiseBuffer;
                noiseSource.loop = true;
                
                const filter = audioContext.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = freq;
                filter.Q.value = 2;
                
                const gainNode = audioContext.createGain();
                gainNode.gain.value = volume;
                
                // LFO for frequency modulation (simulate speech cadence)
                const lfo = audioContext.createOscillator();
                const lfoGain = audioContext.createGain();
                lfo.frequency.value = 2 * scene.frequency;
                lfoGain.gain.value = 100;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                lfo.start();
                
                noiseSource.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(masterGainNode);
                noiseSource.start();
                
                scene.noiseNodes.push({ source: noiseSource, gain: gainNode, lfo: lfo });
            };

            // Create multiple babble layers
            createBabble(300, scene.volume * 0.3);
            createBabble(500, scene.volume * 0.25);
            createBabble(700, scene.volume * 0.2);

            // Coffee machine hum
            const humOsc = audioContext.createOscillator();
            const humGain = audioContext.createGain();
            humOsc.type = 'triangle';
            humOsc.frequency.value = 120;
            humGain.gain.value = 0.05 * scene.volume;
            humOsc.connect(humGain);
            humGain.connect(masterGainNode);
            humOsc.start();
            scene.oscillators.push(humOsc);

            // Cup clinking sounds
            createCupSounds();
        }

        function createCupSounds() {
            const scene = scenes.cafe;
            const interval = 5000 / scene.frequency;

            const createCupClink = () => {
                if (currentScene !== 'cafe' || !isPlaying) return;
                
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(1500 + Math.random() * 500, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(800, audioContext.currentTime + 0.2);
                
                gainNode.gain.setValueAtTime(0.15 * scene.frequency, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                
                oscillator.connect(gainNode);
                gainNode.connect(masterGainNode);
                
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.3);
                
                scene.oscillators.push(oscillator);
                
                setTimeout(createCupClink, interval + Math.random() * 3000);
            };
            
            setTimeout(createCupClink, 2000);
        }

        // Start ocean sound
        function startOcean() {
            const scene = scenes.ocean;
            scene.oscillators = [];
            scene.noiseNodes = [];

            // Brown noise for waves
            const noiseBuffer = createBrownNoiseBuffer();
            const noiseSource = audioContext.createBufferSource();
            noiseSource.buffer = noiseBuffer;
            noiseSource.loop = true;

            // Filter for wave sound
            const filter = audioContext.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 600;

            // LFO to modulate filter frequency (wave motion)
            const lfo = audioContext.createOscillator();
            const lfoGain = audioContext.createGain();
            lfo.type = 'sine';
            lfo.frequency.value = scene.frequency * 0.15;
            lfoGain.gain.value = 400;
            lfo.connect(lfoGain);
            lfoGain.connect(filter.frequency);
            lfo.start();

            // Gain for volume
            const gainNode = audioContext.createGain();
            gainNode.gain.value = scene.volume;

            // LFO to modulate volume
            const volumeLfo = audioContext.createOscillator();
            const volumeLfoGain = audioContext.createGain();
            volumeLfo.type = 'sine';
            volumeLfo.frequency.value = scene.frequency * 0.15;
            volumeLfoGain.gain.value = scene.volume * 0.3;
            volumeLfo.connect(volumeLfoGain);
            volumeLfoGain.connect(gainNode.gain);
            volumeLfo.start();

            // Connect nodes
            noiseSource.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(masterGainNode);

            noiseSource.start();
            scene.noiseNodes.push({ source: noiseSource, gain: gainNode, filter: filter, lfos: [lfo, volumeLfo] });

            // Add some wave crashes periodically
            createWaveCrashes();
        }

        function createWaveCrashes() {
            const scene = scenes.ocean;
            const interval = 8000 / scene.frequency;

            const createWaveCrash = () => {
                if (currentScene !== 'ocean' || !isPlaying) return;
                
                const noiseBuffer = createNoiseBuffer();
                const noiseSource = audioContext.createBufferSource();
                noiseSource.buffer = noiseBuffer;
                
                const filter = audioContext.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.setValueAtTime(100, audioContext.currentTime);
                filter.frequency.linearRampToValueAtTime(1000, audioContext.currentTime + 0.5);
                
                const gainNode = audioContext.createGain();
                gainNode.gain.setValueAtTime(0.01, audioContext.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.2 * scene.frequency, audioContext.currentTime + 0.3);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 1.5);
                
                noiseSource.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(masterGainNode);
                
                noiseSource.start();
                noiseSource.stop(audioContext.currentTime + 1.5);
                
                scene.noiseNodes.push({ source: noiseSource, gain: gainNode });
                
                setTimeout(createWaveCrash, interval + Math.random() * 4000);
            };
            
            setTimeout(createWaveCrash, 3000);
        }

        // Stop current scene sounds
        function stopCurrentScene() {
            if (currentScene && scenes[currentScene]) {
                const scene = scenes[currentScene];
                scene.oscillators.forEach(osc => {
                    try { osc.stop(); } catch(e) {}
                });
                scene.noiseNodes.forEach(node => {
                    try { 
                        if (node.source) node.source.stop();
                        if (node.lfo) node.lfo.stop();
                        if (node.lfos) node.lfos.forEach(lfo => lfo.stop());
                    } catch(e) {}
                });
                scene.oscillators = [];
                scene.noiseNodes = [];
            }
        }

        // Select scene
        function selectScene(sceneName) {
            initAudio();
            
            // Remove active class from all cards
            document.querySelectorAll('.scene-card').forEach(card => {
                card.classList.remove('active');
            });
            
            // Add active class to selected card
            const selectedCard = document.querySelector(`[data-scene="${sceneName}"]`);
            if (selectedCard) {
                selectedCard.classList.add('active');
            }
            
            // Update current scene name
            document.getElementById('current-scene-name').textContent = 
                scenes[sceneName].icon + ' ' + scenes[sceneName].name;
            
            // If playing, stop current and start new
            const wasPlaying = isPlaying;
            stopCurrentScene();
            currentScene = sceneName;
            
            // Start visual effects
            startVisualEffects(sceneName);
            
            if (wasPlaying) {
                startCurrentScene();
            }
        }

        // Start current scene
        function startCurrentScene() {
            if (!currentScene) {
                selectScene('rain');
            }
            
            switch(currentScene) {
                case 'rain':
                    startRain();
                    break;
                case 'library':
                    startLibrary();
                    break;
                case 'cafe':
                    startCafe();
                    break;
                case 'ocean':
                    startOcean();
                    break;
            }
        }

        // Toggle play/pause
        function togglePlay() {
            initAudio();
            
            if (!currentScene) {
                selectScene('rain');
            }
            
            const playBtn = document.getElementById('play-btn');
            const playIcon = document.getElementById('play-icon');
            
            if (isPlaying) {
                stopCurrentScene();
                isPlaying = false;
                playBtn.classList.remove('playing');
                playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
            } else {
                startCurrentScene();
                isPlaying = true;
                playBtn.classList.add('playing');
                playIcon.innerHTML = '<path d="M6 4h4v16H6zM14 4h4v16h-4z"/>';
            }
        }

        // Toggle mute
        function toggleMute() {
            if (!masterGainNode) return;
            
            isMuted = !isMuted;
            const volumeIcon = document.getElementById('volume-icon');
            
            if (isMuted) {
                masterGainNode.gain.value = 0;
                volumeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />';
            } else {
                masterGainNode.gain.value = document.getElementById('volume-slider').value / 100;
                volumeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />';
            }
        }

        // Set volume
        function setVolume(value) {
            if (masterGainNode && !isMuted) {
                masterGainNode.gain.value = value / 100;
            }
            document.getElementById('volume-value').textContent = value + '%';
        }

        // Reset all
        function resetAll() {
            Object.keys(scenes).forEach(scene => {
                scenes[scene].frequency = 1.0;
                document.getElementById(scene + '-freq').textContent = '1.0';
            });
            
            if (currentScene) {
                stopCurrentScene();
                if (isPlaying) {
                    startCurrentScene();
                }
            }
            
            startVisualEffects(currentScene);
        }

        // Visual effects
        let visualIntervals = [];
        
        function startVisualEffects(sceneName) {
            // Clear existing intervals
            visualIntervals.forEach(interval => clearInterval(interval));
            visualIntervals = [];
            
            // Clear all overlays
            document.querySelectorAll('.scene-overlay').forEach(overlay => {
                overlay.innerHTML = '';
            });
            
            if (!sceneName) return;
            
            const scene = scenes[sceneName];
            const overlay = document.getElementById(sceneName + '-overlay');
            if (!overlay) return;
            
            switch(sceneName) {
                case 'rain':
                    createRainVisual(overlay, scene);
                    break;
                case 'library':
                    createLibraryVisual(overlay, scene);
                    break;
                case 'cafe':
                    createCafeVisual(overlay, scene);
                    break;
                case 'ocean':
                    createOceanVisual(overlay, scene);
                    break;
            }
        }
        
        function createRainVisual(overlay, scene) {
            const createDrop = () => {
                const drop = document.createElement('div');
                drop.className = 'rain-drop';
                drop.style.left = Math.random() * 100 + '%';
                drop.style.height = (30 + Math.random() * 50) + 'px';
                drop.style.animationDuration = (1 / scene.frequency) + 's';
                drop.style.opacity = 0.3 + Math.random() * 0.4;
                overlay.appendChild(drop);
                
                setTimeout(() => {
                    if (drop.parentNode) drop.parentNode.removeChild(drop);
                }, 1000 / scene.frequency);
            };
            
            const interval = setInterval(() => {
                const count = Math.floor(3 * scene.frequency);
                for (let i = 0; i < count; i++) {
                    setTimeout(createDrop, Math.random() * 100);
                }
            }, 100);
            visualIntervals.push(interval);
        }
        
        function createLibraryVisual(overlay, scene) {
            const createPageTurn = () => {
                const page = document.createElement('div');
                page.className = 'book-page';
                page.style.right = '10%';
                page.style.top = '10%';
                page.style.animationDuration = (0.8 / scene.frequency) + 's';
                overlay.appendChild(page);
                
                setTimeout(() => {
                    if (page.parentNode) page.parentNode.removeChild(page);
                }, 800 / scene.frequency);
            };
            
            const interval = setInterval(createPageTurn, 2000 / scene.frequency);
            visualIntervals.push(interval);
        }
        
        function createCafeVisual(overlay, scene) {
            const createSteam = () => {
                const steam = document.createElement('div');
                steam.className = 'coffee-steam';
                steam.style.left = (30 + Math.random() * 40) + '%';
                steam.style.bottom = '20%';
                steam.style.animationDuration = (2 / scene.frequency) + 's';
                overlay.appendChild(steam);
                
                setTimeout(() => {
                    if (steam.parentNode) steam.parentNode.removeChild(steam);
                }, 2000 / scene.frequency);
            };
            
            const interval = setInterval(() => {
                const count = Math.floor(2 * scene.frequency);
                for (let i = 0; i < count; i++) {
                    setTimeout(createSteam, Math.random() * 500);
                }
            }, 300);
            visualIntervals.push(interval);
        }
        
        function createOceanVisual(overlay, scene) {
            for (let i = 0; i < 3; i++) {
                const wave = document.createElement('div');
                wave.className = 'wave';
                wave.style.bottom = (i * 15) + '%';
                wave.style.animationDuration = (3 / scene.frequency) + 's';
                wave.style.animationDelay = (i * 0.5) + 's';
                wave.style.opacity = 0.3 - (i * 0.08);
                overlay.appendChild(wave);
            }
        }

        // Click interaction on scene cards
        document.querySelectorAll('.scene-card').forEach(card => {
            card.addEventListener('click', function(e) {
                const sceneName = this.dataset.scene;
                const scene = scenes[sceneName];
                
                // Only adjust frequency if this is the current scene
                if (currentScene === sceneName) {
                    // Increase frequency
                    scene.frequency = Math.min(scene.frequency + scene.step, scene.maxFreq);
                    
                    // If at max, reset to min
                    if (scene.frequency >= scene.maxFreq) {
                        scene.frequency = scene.minFreq;
                    }
                    
                    // Update display
                    document.getElementById(sceneName + '-freq').textContent = scene.frequency.toFixed(1);
                    
                    // Create click effect
                    createClickEffect(e.clientX, e.clientY);
                    
                    // Restart sounds if playing
                    if (isPlaying) {
                        stopCurrentScene();
                        startCurrentScene();
                    }
                    
                    // Restart visual effects
                    startVisualEffects(sceneName);
                }
            });
        });
        
        function createClickEffect(x, y) {
            const wave = document.createElement('div');
            wave.className = 'volume-wave';
            wave.style.position = 'fixed';
            wave.style.left = x + 'px';
            wave.style.top = y + 'px';
            wave.style.zIndex = '9999';
            document.body.appendChild(wave);
            
            setTimeout(() => {
                if (wave.parentNode) wave.parentNode.removeChild(wave);
            }, 1000);
        }

        // Start with rain scene selected
        document.addEventListener('DOMContentLoaded', () => {
            selectScene('rain');
            startVisualEffects('rain');
        });
    </script>
</body>
</html>
